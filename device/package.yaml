# Toit on-device loader for the porta smoke test.
# The on-device install code (flash-image, container_registry) is lifted from
# ~/workspaceToit/jaguar/src and uses the SDK's system.containers (no package
# dependency). See ../docs/specs.
name: loader
description: On-device loader that pulls a container image over UDP/TFTP and installs it.
dependencies:
  # NOTE: machine-specific absolute path (per CLAUDE.md, packages live under
  # ~/workspaceToit/). A clone on a different layout must adjust this path.
  tftp:
    path: /home/david/workspaceToit/tftp
