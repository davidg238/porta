<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ST Debug — {{.DeviceName}}</title>
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <script src="https://unpkg.com/htmx.org@1.9.10/dist/ext/sse.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
      background: #1e1e1e; color: #d4d4d4;
      height: 100vh; display: flex; flex-direction: column;
    }
    .status-bar {
      display: flex; align-items: center; gap: 1rem;
      padding: 0.5rem 1rem; background: #252526;
      border-bottom: 1px solid #3c3c3c; font-size: 0.85rem;
    }
    .device-name { font-weight: 600; color: #569cd6; }
    .status { padding: 0.15rem 0.5rem; border-radius: 3px; font-size: 0.75rem; text-transform: uppercase; }
    .status.paused { background: #4e3a1a; color: #dcdcaa; }
    .status.running { background: #1a3a1a; color: #6a9955; }
    .location { color: #9cdcfe; }
    .main-layout {
      display: grid; grid-template-columns: 1fr 300px;
      grid-template-rows: 1fr 1fr; flex: 1; overflow: hidden;
    }
    .source-panel { grid-row: 1 / -1; overflow-y: auto; border-right: 1px solid #3c3c3c; }
    .stack-panel { border-bottom: 1px solid #3c3c3c; overflow-y: auto; }
    .locals-panel { overflow-y: auto; }
    .panel { padding: 0.5rem; }
    .panel-header { font-size: 0.75rem; text-transform: uppercase; color: #888; margin-bottom: 0.5rem; letter-spacing: 0.05em; }
    .source-header { font-size: 0.75rem; color: #888; margin-bottom: 0.25rem; padding: 0.25rem 0; }
    .source-code { font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 0.8rem; line-height: 1.5; }
    .line { white-space: pre; }
    .line.current { background: #2a2d2e; border-left: 3px solid #569cd6; padding-left: calc(0.5rem - 3px); }
    .line.breakpoint .bp-dot { color: #e51400; }
    .gutter { color: #555; margin-right: 1rem; user-select: none; }
    .frame { padding: 0.25rem 0; font-family: monospace; font-size: 0.8rem; }
    .frame:first-child { color: #dcdcaa; }
    .line-ref { color: #666; }
    .locals-table { width: 100%; font-family: monospace; font-size: 0.8rem; }
    .locals-table tr:hover { background: #2a2d2e; }
    .var-name { color: #9cdcfe; padding: 0.2rem 0.5rem 0.2rem 0; white-space: nowrap; }
    .var-value { color: #ce9178; padding: 0.2rem 0; }
    .empty { color: #555; font-style: italic; padding: 1rem; }
  </style>
</head>
<body hx-ext="sse" sse-connect="/debug/events?device={{.DeviceEUI}}">

  {{.StatusHTML}}

  <div class="main-layout">
    <div sse-swap="debug-source" hx-swap="innerHTML">
      {{.SourceHTML}}
    </div>
    <div sse-swap="debug-stack" hx-swap="innerHTML">
      {{.StackHTML}}
    </div>
    <div sse-swap="debug-locals" hx-swap="innerHTML">
      {{.LocalsHTML}}
    </div>
  </div>

</body>
</html>
